[project]
name = "kajet-turbo"
version = "0.1.0"
description = "RAG dla notatek markdown — dostęp z Claude mobile via MCP OAuth"
authors = [{ name = "Jacek Palczewski", email = "jpalczewski@gmail.com" }]
requires-python = ">=3.14"
dependencies = [
    "fastapi>=0.115.0",
    "uvicorn>=0.30.0",
    "fastmcp>=3.2.0",
    "sqlite-vec>=0.1.9",
    "sqlmodel>=0.0.38",
    "python-frontmatter>=1.1.0",
    "nanoid>=2.0.0",
    "dulwich>=0.21.0",
    "argon2-cffi>=23.1.0",
    "loguru>=0.7.3",
    "alembic>=1.13.0",
    "bleach>=6.4.0",
    "cachetools>=5.5",
    "sqlalchemy>=2.0.45",
    "markdown-it-py>=3.0",
    "cryptography>=48.0.0",
]

[project.scripts]
kajet-turbo = "kajet_turbo.server:main"

[build-system]
requires = ["uv_build>=0.11.4,<0.12.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "ruff>=0.9",
    "httpx>=0.27",
    "ty>=0.0.49",
    "pytest-xdist>=3.8.0",
]

[tool.ty.src]
# Alembic migrations are autogenerated boilerplate; not worth type-checking.
exclude = ["alembic"]

[tool.ty.environment]
# tests/scripts/test_bench_report.py imports bench_report from scripts/ via sys.path.
extra-paths = ["scripts"]

[tool.ruff]
target-version = "py314"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "C4", "RUF", "PTH", "PLC", "PLE", "PLW"]
# Function-level imports are deliberate: env-var ordering (free-threading guard)
# and circular-import avoidance.
ignore = ["PLC0415"]

[tool.ruff.lint.flake8-bugbear]
# FastAPI's `Depends(...)` in argument defaults is the framework idiom, not a bug.
extend-immutable-calls = ["fastapi.Depends"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "-q -n auto"
